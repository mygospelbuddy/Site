<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=EDGE">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reference Search</title>
  <link rel="stylesheet" href="search-common.css">
</head>
<body class="gb-page-body">
  <main class="gb-search-shell">
    <nav class="gb-search-nav" aria-label="Search tools">
      <a class="gb-search-nav__link gb-search-nav__link--active" href="./index.html">Reference Search</a>
      <a class="gb-search-nav__link" href="./words.html">Conference Text Search</a>
      <a class="gb-search-nav__link" href="./using-conference-text-search.html">Search Guide</a>
    </nav>

    <section class="gb-search-hero">
      <h1 class="gb-search-hero__title">Reference Search</h1>
      <p class="gb-search-hero__subtitle">Find General Conference talks tied to a scripture reference.</p>
    </section>

    <details class="gb-settings-disclosure">
      <summary class="gb-settings-summary">Search settings</summary>
      <div class="gb-settings-panel">
        <div class="gb-settings-grid gb-settings-grid--3">
          <div class="gb-field">
            <label class="gb-settings-label" for="referenceCountMode">Count mode</label>
            <select id="referenceCountMode" class="gb-select">
              <option value="footnotes">Total footnote mentions</option>
              <option value="talks">Distinct talks</option>
            </select>
          </div>

          <div class="gb-field gb-range-wrap">
            <div class="gb-range-meta">
              <label class="gb-settings-label" for="referenceMinQuotePercent">Minimum quoted percentage</label>
              <output id="referenceMinQuotePercentValue" class="gb-range-value">All</output>
            </div>
            <input id="referenceMinQuotePercent" class="gb-range" type="range" min="0" max="100" step="1" value="0">
          </div>

          <div class="gb-field gb-settings-toggles">
            <span class="gb-settings-label">Filters</span>
            <label class="gb-checkbox" for="referenceApostlesOnly">
              <input type="checkbox" id="referenceApostlesOnly">
              Apostles only
            </label>
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="referenceYearFrom">Year from</label>
            <input id="referenceYearFrom" class="gb-input" type="number" min="1970" max="2100" placeholder="1970">
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="referenceYearTo">Year to</label>
            <input id="referenceYearTo" class="gb-input" type="number" min="1970" max="2100" placeholder="2025">
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="referenceMonth">Conference</label>
            <select id="referenceMonth" class="gb-select">
              <option value="">All conferences</option>
              <option value="April">April</option>
              <option value="October">October</option>
            </select>
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="referenceSpeaker">Speaker</label>
            <input id="referenceSpeaker" class="gb-input" type="text" placeholder="Filter by speaker">
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="referencePageSize">Rows per page</label>
            <select id="referencePageSize" class="gb-select">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>

        <div class="gb-btn-row">
          <button id="referenceResetButton" class="gb-btn gb-btn--secondary" type="button">Reset defaults</button>
        </div>
      </div>
    </details>

    <section class="gb-search-card">
      <div class="gb-search-card__heading">
        <div class="gb-search-card__heading-group">
          <h2 class="gb-search-card__title">Search</h2>
          <button
            class="gb-info-button"
            type="button"
            aria-label="Reference search help"
            title="Use Single verse for one verse or a whole chapter. Use Verse range for one continuous range inside one chapter. Use Advanced text for abbreviations, chapter ranges, or cross-chapter references inside one book."
          >i</button>
        </div>
      </div>

      <div class="gb-mode-switch" role="tablist" aria-label="Reference search modes">
        <button class="gb-mode-switch__button gb-mode-switch__button--active" type="button" data-reference-mode="quick">Single verse</button>
        <button class="gb-mode-switch__button" type="button" data-reference-mode="range">Verse range</button>
        <button class="gb-mode-switch__button" type="button" data-reference-mode="text">Advanced text</button>
      </div>

      <div class="gb-panel is-active" data-reference-panel="quick">
        <div class="gb-form-grid gb-form-grid--3">
          <div class="gb-field">
            <label class="gb-field__label" for="quickBook">Book</label>
            <select id="quickBook" class="gb-select">
              <option value="">Select a book</option>
            </select>
          </div>
          <div class="gb-field">
            <label class="gb-field__label" for="quickChapter">Chapter</label>
            <select id="quickChapter" class="gb-select">
              <option value="">All chapters</option>
            </select>
          </div>
          <div class="gb-field">
            <label class="gb-field__label" for="quickVerse">Verse</label>
            <select id="quickVerse" class="gb-select">
              <option value="all">All verses</option>
            </select>
          </div>
        </div>
      </div>

      <div class="gb-panel" data-reference-panel="range">
        <div class="gb-form-grid gb-form-grid--4">
          <div class="gb-field">
            <label class="gb-field__label" for="rangeBook">Book</label>
            <select id="rangeBook" class="gb-select">
              <option value="">Select a book</option>
            </select>
          </div>
          <div class="gb-field">
            <label class="gb-field__label" for="rangeChapter">Chapter</label>
            <select id="rangeChapter" class="gb-select">
              <option value="">All chapters</option>
            </select>
          </div>
          <div class="gb-field">
            <label class="gb-field__label" for="rangeStartVerse">Start verse</label>
            <select id="rangeStartVerse" class="gb-select">
              <option value="all">All verses</option>
            </select>
          </div>
          <div class="gb-field">
            <label class="gb-field__label" for="rangeEndVerse">End verse</label>
            <select id="rangeEndVerse" class="gb-select">
              <option value="all">All verses</option>
            </select>
          </div>
        </div>
      </div>

      <div class="gb-panel" data-reference-panel="text">
        <div class="gb-field">
          <label class="gb-field__label" for="textReference">Reference</label>
          <textarea id="textReference" class="gb-textarea" placeholder="Alma 32-33 or Genesis 1:31-2:3"></textarea>
        </div>
      </div>

      <div class="gb-btn-row">
        <button id="referenceSearchButton" class="gb-btn gb-btn--primary" type="button">Search</button>
        <button id="referenceClearButton" class="gb-btn gb-btn--secondary" type="button">Clear</button>
      </div>

      <div id="referenceStatus" class="gb-status" aria-live="polite"></div>
    </section>

    <div id="referenceResults"></div>
  </main>

  <script src="search-common.js"></script>
  <script src="scriptureDisplay.js"></script>
  <script src="search.js"></script>
</body>
</html>
