<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=EDGE">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conference Text Search</title>
  <link rel="stylesheet" href="search-common.css">
</head>
<body class="gb-page-body">
  <main class="gb-search-shell">
    <nav class="gb-search-nav" aria-label="Search tools">
      <a class="gb-search-nav__link" href="./index.html">Reference Search</a>
      <a class="gb-search-nav__link gb-search-nav__link--active" href="./words.html">Conference Text Search</a>
      <a class="gb-search-nav__link" href="./using-conference-text-search.html">Search Guide</a>
    </nav>

    <section class="gb-search-hero">
      <h1 class="gb-search-hero__title">Conference Text Search</h1>
      <p class="gb-search-hero__subtitle">Track words and phrases across General Conference.</p>
    </section>

    <details class="gb-settings-disclosure">
      <summary class="gb-settings-summary">Search settings</summary>
      <div class="gb-settings-panel">
        <div class="gb-settings-grid gb-settings-grid--3">
          <div class="gb-field gb-settings-toggles">
            <span class="gb-settings-label">View</span>
            <label class="gb-checkbox" for="wordsByConference">
              <input type="checkbox" id="wordsByConference">
              By conference
            </label>
            <label class="gb-checkbox" for="wordsTableMode">
              <input type="checkbox" id="wordsTableMode">
              Table mode
            </label>
          </div>

          <div class="gb-field">
            <span class="gb-settings-label">Measurement</span>
            <div class="gb-radio-group">
              <label class="gb-radio" for="wordsMetricPerTalk">
                <input type="radio" id="wordsMetricPerTalk" name="wordsMetric">
                Per talk
              </label>
              <label class="gb-radio" for="wordsMetricPer1000">
                <input type="radio" id="wordsMetricPer1000" name="wordsMetric" checked>
                Per 1000 words
              </label>
            </div>
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="wordsChartType">Chart type</label>
            <select id="wordsChartType" class="gb-select">
              <option value="scatter">Scatter</option>
              <option value="line">Line</option>
              <option value="bar">Bar</option>
            </select>
          </div>

          <div class="gb-field gb-settings-toggles">
            <span class="gb-settings-label">Matching</span>
            <label class="gb-checkbox" for="wordsCaseSensitive">
              <input type="checkbox" id="wordsCaseSensitive">
              Case sensitive
            </label>
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="wordsYearFrom">Year from</label>
            <input id="wordsYearFrom" class="gb-input" type="number" min="1970" max="2100" placeholder="1970">
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="wordsYearTo">Year to</label>
            <input id="wordsYearTo" class="gb-input" type="number" min="1970" max="2100" placeholder="2025">
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="wordsMonth">Conference</label>
            <select id="wordsMonth" class="gb-select">
              <option value="">All conferences</option>
              <option value="April">April</option>
              <option value="October">October</option>
            </select>
          </div>

          <div class="gb-field">
            <label class="gb-settings-label" for="wordsSpeaker">Speaker</label>
            <input id="wordsSpeaker" class="gb-input" type="text" placeholder="Filter by speaker">
          </div>
        </div>

        <div class="gb-btn-row">
          <button id="wordsResetDefaults" class="gb-btn gb-btn--secondary" type="button">Reset defaults</button>
        </div>
      </div>
    </details>

    <section class="gb-search-card">
      <div class="gb-search-card__heading">
        <div class="gb-search-card__heading-group">
          <h2 class="gb-search-card__title">Search</h2>
          <button
            class="gb-info-button"
            type="button"
            aria-label="Conference text search help"
            title='Use quotes for exact phrases. Use || for OR groups. Use a minus for NOT. Use parentheses to compare multiple series on one chart. Example: ("plan of salvation") (faith || faithful) temple -garment'
          >i</button>
        </div>
      </div>

      <div class="gb-search-row gb-search-row--input">
        <label class="gb-sr-only" for="wordInput">Search conference talks</label>
        <input id="wordInput" class="gb-input gb-search-input" type="text" placeholder="Search conference talks...">
        <button id="wordSearchButton" class="gb-btn gb-btn--primary" type="button">Search</button>
        <button id="wordClearButton" class="gb-btn gb-btn--secondary" type="button">Clear</button>
      </div>

      <div id="wordsStatus" class="gb-status" aria-live="polite"></div>
    </section>

    <section class="gb-chart-card">
      <div class="gb-btn-row">
        <button id="wordsExportAggregate" class="gb-btn gb-btn--ghost gb-btn--small" type="button" disabled>Export chart data</button>
        <button id="wordsExportTalks" class="gb-btn gb-btn--ghost gb-btn--small" type="button" disabled>Export talks</button>
      </div>

      <div id="legendContainer" class="gb-legend" aria-live="polite"></div>

      <div class="gb-chart-wrap">
        <canvas id="plotCanvas" aria-label="Conference text search chart"></canvas>
      </div>

      <div id="aggregateTableContainer"></div>
    </section>

    <div id="talksTableContainer"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="search-common.js"></script>
  <script src="words-search.js"></script>
</body>
</html>
